openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Student Career Development and Placement Readiness System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: students
    description: Student operations
  - name: skills
    description: Student skills
  - name: projects
    description: Student projects
  - name: internships
    description: Student internships
  - name: certifications
    description: Student certifications
  - name: ai
    description: AI analysis
  - name: companies
    description: Company management
  - name: jobs
    description: Job postings
  - name: interviews
    description: Interview scheduling
  - name: notifications
    description: Notifications
  - name: analytics
    description: Analytics and reports
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Auth ───────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginCredentials"
      responses:
        "200":
          description: Auth tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/account:
    put:
      operationId: updateMyAccount
      tags: [auth]
      summary: Update account name/email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountBody"
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/password:
    put:
      operationId: changeMyPassword
      tags: [auth]
      summary: Change account password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangePasswordResponse"

  # ─── Student Profile ─────────────────────────────────────────────────────────
  /students/profile:
    get:
      operationId: getMyProfile
      tags: [students]
      summary: Get my student profile
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProfile"
    put:
      operationId: updateMyProfile
      tags: [students]
      summary: Update my student profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProfile"

  /students/academics:
    get:
      operationId: getMyAcademics
      tags: [students]
      summary: Get my academic records
      responses:
        "200":
          description: Academic records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicSummary"
    put:
      operationId: updateMyAcademics
      tags: [students]
      summary: Update my academic records
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcademicsUpdate"
      responses:
        "200":
          description: Updated academics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicSummary"

  /students/dashboard:
    get:
      operationId: getStudentDashboard
      tags: [students]
      summary: Get student dashboard summary
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
