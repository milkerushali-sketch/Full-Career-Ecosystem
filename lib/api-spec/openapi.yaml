  # ─── AI Analysis ─────────────────────────────────────────────────────────────
  /students/ai-analysis:
    get:
      operationId: getAIAnalysis
      tags: [ai]
      summary: Get latest AI analysis for current student
      responses:
        "200":
          description: AI analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIAnalysis"
    post:
      operationId: triggerAIAnalysis
      tags: [ai]
      summary: Trigger fresh AI analysis
      responses:
        "200":
          description: Fresh analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIAnalysis"

  /students/eligibility:
    get:
      operationId: getCompanyEligibility
      tags: [ai]
      summary: Get eligible companies for current student
      responses:
        "200":
          description: Company eligibility list
          content:
