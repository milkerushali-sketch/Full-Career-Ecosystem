              schema:
                $ref: "#/components/schemas/CodingProfiles"
    put:
      operationId: updateCodingProfiles
      tags: [students]
      summary: Update coding profiles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CodingProfilesUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
