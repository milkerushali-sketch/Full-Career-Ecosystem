  # ─── Skills ──────────────────────────────────────────────────────────────────
  /students/skills:
    get:
      operationId: listMySkills
      tags: [skills]
      summary: List my skills
      responses:
        "200":
          description: Skills list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Skill"
    post:
      operationId: addSkill
      tags: [skills]
      summary: Add a skill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"

  /students/skills/{id}:
    delete:
      operationId: removeSkill
      tags: [skills]
      summary: Remove a skill
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Projects ────────────────────────────────────────────────────────────────
  /students/projects:
    get:
      operationId: listMyProjects
      tags: [projects]
      summary: List my projects
      responses:
        "200":
          description: Projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: addProject
      tags: [projects]
      summary: Add a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /students/projects/{id}:
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Internships ─────────────────────────────────────────────────────────────
  /students/internships:
    get:
      operationId: listMyInternships
      tags: [internships]
      summary: List my internships
      responses:
        "200":
          description: Internships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Internship"
    post:
      operationId: addInternship
      tags: [internships]
      summary: Add an internship
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternshipInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Internship"

  /students/internships/{id}:
    patch:
      operationId: updateInternship
      tags: [internships]
      summary: Update an internship
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternshipUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Internship"
    delete:
      operationId: deleteInternship
      tags: [internships]
      summary: Delete an internship
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
