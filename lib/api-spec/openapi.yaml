  # ─── Certifications ──────────────────────────────────────────────────────────
  /students/certifications:
    get:
      operationId: listMyCertifications
      tags: [certifications]
      summary: List my certifications
      responses:
        "200":
          description: Certifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Certification"
    post:
      operationId: addCertification
      tags: [certifications]
      summary: Add a certification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CertificationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Certification"

  /students/certifications/{id}:
    delete:
      operationId: deleteCertification
      tags: [certifications]
      summary: Delete a certification
      parameters:
        - name: id
          in: path
          required: true
